#cloud-config
# =============================================================================
#  Timeweb Cloud-init для VPS Ubuntu 22.04
#
#  Вставь содержимое этого файла в поле "User data" при создании сервера.
#  Лог: /var/log/cloud-init-output.log
# =============================================================================

runcmd:
  - sleep 10
  - |
    curl -fsSL \
      "https://raw.githubusercontent.com/nfsishka-dot/nfc-cards/main/deploy/setup-vps.sh" \
      -o /root/setup-vps.sh \
    && bash /root/setup-vps.sh > /root/setup-vps.log 2>&1 \
    && echo "setup-vps.sh: OK" \
    || echo "setup-vps.sh: FAILED — смотри /root/setup-vps.log"

  - |
    curl -fsSL \
      "https://raw.githubusercontent.com/nfsishka-dot/nfc-cards/main/deploy/deploy.sh" \
      -o /tmp/nfc-deploy.sh \
    && sudo -u deploy mkdir -p /var/www/nfc-cards/deploy \
    && install -m 755 -o deploy -g deploy /tmp/nfc-deploy.sh /var/www/nfc-cards/deploy/deploy.sh \
    && rm -f /tmp/nfc-deploy.sh \
    && echo "deploy.sh: OK" \
    || echo "deploy.sh: FAILED"

final_message: |
  =====================================================================
  Сервер настроен. Лог: /root/setup-vps.log

  Дальше по SSH:
    1. nano /var/www/nfc-cards/.env  (замени MY_SERVER_IP)
    2. Первый клон: sudo bash /var/www/nfc-cards/deploy/bootstrap-server.sh
       (или git clone вручную в /var/www/nfc-cards)
    3. sudo bash /var/www/nfc-cards/deploy/deploy.sh

  Диагностика: journalctl -u app -n 30 --no-pager
  =====================================================================
