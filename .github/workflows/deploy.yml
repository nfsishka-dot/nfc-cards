# Production deploy V5: deploy/v5-deploy.sh на VPS (shared/.env, releases, current, healthcheck, отчёт).
# Secrets: SSH_PRIVATE_KEY, VPS_HOST, VPS_USER
# Cursor/агент с этой машины НЕ может подтвердить успех деплоя без доступа к GitHub Actions и VPS.

name: Production Deploy (V5)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  production-deploy-v5:
    runs-on: ubuntu-latest
    env:
      # Снимает предупреждение про Node.js 20 на runner (см. changelog GitHub Actions)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Многострочный SSH_PRIVATE_KEY через ${{ secrets.X }} в echo часто ломает ключ.
      # Пишем ключ через env — так сохраняются переводы строк PEM.
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ -z "$SSH_PRIVATE_KEY" ]]; then
            echo "::error::Секрет SSH_PRIVATE_KEY пустой. Settings → Secrets → Actions."
            exit 1
          fi
          if [[ -z "${VPS_HOST:-}" ]]; then
            echo "::error::Секрет VPS_HOST пустой (нужен IP или домен сервера)."
            exit 1
          fi
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run v5-deploy on server
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [[ -z "${VPS_USER:-}" ]]; then
            echo "::error::Секрет VPS_USER пустой."
            exit 1
          fi
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            bash -s < deploy/v5-deploy.sh
