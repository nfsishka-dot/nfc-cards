# Production deploy V5: deploy/v5-deploy.sh на VPS (shared/.env, releases, current, healthcheck, отчёт).
# Secrets: SSH_PRIVATE_KEY, VPS_HOST, VPS_USER
# Cursor/агент с этой машины НЕ может подтвердить успех деплоя без доступа к GitHub Actions и VPS.

name: Production Deploy (V5)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  production-deploy-v5:
    runs-on: ubuntu-latest
    env:
      # Снимает предупреждение про Node.js 20 на runner (см. changelog GitHub Actions)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Run v5-deploy on server
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            bash -s < deploy/v5-deploy.sh
