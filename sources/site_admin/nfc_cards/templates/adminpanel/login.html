{% extends "base.html" %}

{% block title %}Вход в админ-панель{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-24">
    <div class="w-full max-w-sm mx-auto border border-gray-200 rounded-xl p-6">
        <h1 class="text-xl font-semibold mb-4 text-center">Вход в админ-панель</h1>
        <form method="post" class="space-y-3">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-medium mb-1">Логин</label>
                <input type="text" name="username"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"
                       required>
            </div>
            <div>
                <label class="block text-xs font-medium mb-1">Пароль</label>
                <input type="password" name="password"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"
                       required>
            </div>
            <button type="submit"
                    class="w-full inline-flex justify-center px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
