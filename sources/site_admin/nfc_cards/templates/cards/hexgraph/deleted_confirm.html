<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Подтверждение удаления</title>
</head>
<body>
    <main style="max-width:640px;margin:40px auto;padding:0 16px;font-family:Arial,sans-serif;">
        {% if messages %}
            {% for message in messages %}
                <p role="alert">{{ message }}</p>
            {% endfor %}
        {% endif %}
        <h1>Подтвердите очистку открытки</h1>
        <p>Токен сохранится. Контент открытки, связанные медиа и черновики preview будут удалены.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Очистить открытку</button>
        </form>
    </main>
</body>
</html>
